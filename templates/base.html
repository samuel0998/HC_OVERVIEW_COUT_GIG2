<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}HC Overview{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header class="topbar">
        <div class="topbar-logos">
            <img src="{{ url_for('static', filename='images/amazon_logo.png') }}" alt="Amazon" class="logo-amazon">
            <img src="{{ url_for('static', filename='images/id_logo.png') }}" alt="ID" class="logo-id">
            <img src="{{ url_for('static', filename='images/lion_logo.png') }}" alt="GIG2" class="logo-lion">
        </div>
        <div class="topbar-title">
            <h1>HEADCOUNT OVERVIEW</h1>
            <p>SITE: GIG2 | Gestão de HC</p>
        </div>
        <nav>
            <a href="{{ url_for('hc.home') }}" class="{% if request.endpoint == 'hc.home' %}active{% endif %}">Início</a>
            <a href="{{ url_for('hc.novo_hc') }}" class="{% if request.endpoint == 'hc.novo_hc' %}active{% endif %}">Novo HC</a>
            <a href="{{ url_for('hc.atualizar') }}" class="{% if request.endpoint == 'hc.atualizar' %}active{% endif %}">Atualizar</a>
            <a href="{{ url_for('hc.dashboard') }}" class="{% if request.endpoint == 'hc.dashboard' %}active{% endif %}">Dashboard</a>
        </nav>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
