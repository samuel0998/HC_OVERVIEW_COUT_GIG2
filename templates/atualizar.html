{% extends 'base.html' %}
{% block title %}HC GIG2 | Atualizar Colaborador{% endblock %}
{% block content %}
<div class="page-header">
    <a href="{{ url_for('hc.home') }}" class="btn back-btn">&larr; Voltar</a>
    <h2 class="page-title">Atualizar Colaborador</h2>
</div>

<div class="card">
    <div class="toolbar">
        <input id="busca" type="text" placeholder="Pesquisar por nome / login / cargo / área / turno">
        <button id="btnExportar" class="btn primary">Exportar Excel</button>
        <label class="btn file-btn">
            Importar CSV
            <input id="arquivoImport" type="file" accept=".csv">
        </label>
    </div>
    <div id="mensagem" class="mensagem"></div>
    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Nome</th>
                    <th>Login</th>
                    <th>Cargo</th>
                    <th>Área</th>
                    <th>Turno</th>
                    <th>Status</th>
                    <th>Afastamento</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="tabelaHC"></tbody>
        </table>
    </div>
    <div id="totalRegistros" class="total-registros"></div>
</div>

<div id="modalEdicao" class="modal hidden">
    <div class="modal-content card">
        <h2>Editar Colaborador</h2>
        <form id="formEditar" class="form-grid">
            <input type="hidden" name="id">
            <input type="text" name="nome_completo" placeholder="Nome completo" required>
            <input type="text" name="login" placeholder="Login">
            <select name="cargo" required>
                <option value="">Cargo</option>
                {% for item in cargos %}<option value="{{ item }}">{{ item }}</option>{% endfor %}
            </select>
            <select name="area">
                <option value="">Área</option>
                {% for item in areas %}<option value="{{ item }}">{{ item }}</option>{% endfor %}
            </select>
            <select name="turno">
                <option value="">Turno</option>
                {% for item in turnos %}<option value="{{ item }}">{{ item }}</option>{% endfor %}
            </select>
            <select name="status">
                {% for item in status_list %}<option value="{{ item }}">{{ item }}</option>{% endfor %}
            </select>
            <label class="check"><input type="checkbox" name="previsao_afastamento"> Previsão de afastamento?</label>
            <input type="date" name="data_afastamento">
            <input type="text" name="causa_afastamento" placeholder="Causa / Descrição do afastamento">
            <div class="modal-actions">
                <button type="submit" class="btn primary">Salvar alteração</button>
                <button type="button" id="fecharModal" class="btn danger">Fechar</button>
            </div>
        </form>
    </div>
</div>

<script src="{{ url_for('static', filename='js/atualizar.js') }}"></script>
{% endblock %}
