{% extends 'base.html' %}
{% block title %}HC GIG2 | Novo Colaborador{% endblock %}
{% block content %}
<div class="page-header">
    <a href="{{ url_for('hc.home') }}" class="btn back-btn">&larr; Voltar</a>
    <h2 class="page-title">Novo Colaborador</h2>
</div>

<div class="card form-card">
    <div id="mensagem" class="mensagem"></div>
    <form id="formNovo" class="form-grid">
        <input type="text" name="nome_completo" placeholder="Nome completo *" required>
        <input type="text" name="login" placeholder="Login (Amazon)">
        <select name="cargo" required>
            <option value="">Cargo *</option>
            {% for item in cargos %}<option value="{{ item }}">{{ item }}</option>{% endfor %}
        </select>
        <select name="area">
            <option value="">Área</option>
            {% for item in areas %}<option value="{{ item }}">{{ item }}</option>{% endfor %}
        </select>
        <select name="turno">
            <option value="">Turno</option>
            {% for item in turnos %}<option value="{{ item }}">{{ item }}</option>{% endfor %}
        </select>
        <select name="status">
            {% for item in status_list %}<option value="{{ item }}">{{ item }}</option>{% endfor %}
        </select>
        <label class="check"><input type="checkbox" name="previsao_afastamento"> Previsão de afastamento?</label>
        <input type="date" name="data_afastamento">
        <input type="text" name="causa_afastamento" placeholder="Causa / Descrição do afastamento">
        <div class="form-actions">
            <button type="submit" class="btn primary">Salvar colaborador</button>
            <button type="reset" class="btn">Limpar</button>
        </div>
    </form>
</div>

<script src="{{ url_for('static', filename='js/newcolaborator.js') }}"></script>
{% endblock %}
