<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | HC Overview</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-body">
    <div class="login-page">
        <div class="login-card">
            <div class="login-logos">
                <img src="{{ url_for('static', filename='images/amazon_logo.png') }}" alt="Amazon" class="logo-amazon">
                <img src="{{ url_for('static', filename='images/id_logo.png') }}" alt="ID" class="logo-id">
                <img src="{{ url_for('static', filename='images/lion_logo.png') }}" alt="GIG2" class="logo-lion">
            </div>
            <div class="login-title">
                <h1>HEADCOUNT OVERVIEW</h1>
                <p>Selecione o FC para conectar na instancia</p>
            </div>

            {% if erro %}
            <div class="alert alert-danger">{{ erro }}</div>
            {% endif %}

            <form method="POST" class="login-form">
                <div class="login-field">
                    <label for="fc">FC</label>
                    <select id="fc" name="fc" required>
                        {% for key, item in fc_options.items() %}
                        <option value="{{ key }}" {% if key == selected_fc %}selected{% endif %}>{{ item.label }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="login-field">
                    <label for="login">Login</label>
                    <input type="text" id="login" name="login" placeholder="Seu login de acesso" required autofocus autocomplete="username">
                </div>
                <button type="submit" class="btn primary login-submit">Entrar</button>
            </form>

            <p class="login-version">v1.1.0</p>
        </div>
    </div>
</body>
</html>
